[[permission]]
identifier = "allow-mdtk-workspace"
description = "MD Toolkit workspace path and file IO invoke commands."
commands.allow = [
  "mdtk_get_workspace_path",
  "mdtk_list_files",
  "mdtk_exists",
  "mdtk_is_dir",
  "mdtk_read_file",
  "mdtk_read_file_base64",
  "mdtk_write_file",
  "mdtk_write_file_base64",
  "mdtk_file_mtime",
  "mdtk_ensure_parent_dirs",
  "mdtk_create_dir",
  "mdtk_delete_file",
  "mdtk_remove_dir",
]
